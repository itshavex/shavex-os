<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 | ShaVex OS</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      margin: 0;
      background-color: #030304;
      font-family: 'Inter', sans-serif;
    }
    .error-card {
      text-align: center;
      max-width: 450px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 30px rgba(255, 61, 0, 0.15);
    }
    .error-code {
      font-family: 'Outfit', sans-serif;
      font-size: 5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFF, #FF3D00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .error-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 0.85rem;
      color: #8E929E;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .home-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 61, 0, 0.15);
      border: 1px solid rgba(255, 61, 0, 0.3);
      color: #FF3D00;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .home-btn:hover {
      background: #FF3D00;
      color: #fff;
      box-shadow: 0 0 15px rgba(255, 61, 0, 0.4);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="error-card glass">
    <div class="error-code">500</div>
    <h2 class="error-title">System Error</h2>
    <p class="error-desc">The workspace encountered an unexpected compilation error or failed to connect to the database. Try refreshing the session.</p>
    <button onclick="window.location.reload()" class="home-btn">Reload OS Interface</button>
  </div>
</body>
</html>
